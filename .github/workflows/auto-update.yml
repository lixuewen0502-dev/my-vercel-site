name: Hermes 每日自动更新

on:
  schedule:
    - cron: "0 0 * * *"  # 每天北京时间 8:00 运行
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行 AI 更新
        env:
          HERMES_API_KEY: ${{ secrets.HERMES_API_KEY }}
        run: python hermes_cloud_update.py

      - name: 提交修改
        uses: ad-m/github-push-action@master
        with:
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
